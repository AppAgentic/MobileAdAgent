<!doctype html>
<html lang="en">

  <title>Analysis Flow — Fable Set — Mobile Ad Agent</title>
  <link rel="stylesheet" href="/reveal-fable-flow/styles.css">

<body>
  <header class="bar">
    <a class="brand" href="/" aria-label="Mobile Ad Agent home"><span class="brand-mark">▲</span><span>mobile-ad-agent</span></a>
    <nav class="vnav" aria-label="Flow variants">
      <a href="?variant=1" data-v="1"><b>01</b><span>Contact Sheet</span></a>
      <a href="?variant=2" data-v="2"><b>02</b><span>Reading Room</span></a>

  <footer class="foot">
    <span class="truth"><b>●</b> Only what was actually found in your app is shown</span>
    <span id="thesis"></span>
  </footer>

  <div class="toast" id="toast" role="status" hidden></div>

  <script src="/reveal-fable-flow/app.js" defer></script>
