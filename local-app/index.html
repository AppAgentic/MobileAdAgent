<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mobile Ad Agent</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <nav class="rail" aria-label="Primary">
        <div class="rail-brand">
          <div class="brand-mark">MA</div>
          <div class="brand-text">
            <strong>Mobile</strong>
            <span>Ad Agent</span>
          </div>
        </div>

        <ul class="rail-nav" id="railNav">
          <li><button data-nav="launchpad" class="rail-link is-active" type="button">Launchpad</button></li>
          <li><button data-nav="apps" class="rail-link" type="button">Apps</button></li>
          <li><button data-nav="brand" class="rail-link" type="button">Brand Kit</button></li>
          <li><button data-nav="settings" class="rail-link" type="button">Settings</button></li>
        </ul>

        <div class="rail-quick">
          <p class="rail-label">Quick actions</p>
          <button class="quick-link" data-quick="new-pack" type="button">New pack</button>
          <button class="quick-link" data-quick="import-app" type="button">Import app</button>
          <button class="quick-link" data-quick="upload-proof" type="button">Add proof</button>
        </div>

        <div class="rail-user">
          <div class="avatar" id="userAvatar">AC</div>
          <div class="rail-user-text">
            <strong id="userName">Alex Chan</strong>
            <span id="userRole">Growth</span>
          </div>
        </div>
      </nav>

      <main class="main" aria-label="Workspace">
        <header class="app-header" id="appHeader"></header>
        <div class="view" id="viewRoot"></div>
        <footer class="stepper" id="stepper"></footer>
      </main>

      <aside class="inspector" id="inspectorRoot" aria-label="Guidance"></aside>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
